name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 🟢 Job ที่ 1: ทำการ Build และรัน Test บน Server ของ GitHub (เหมือนเดิมที่เคยรันผ่าน)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Automated Tests
        run: |
          pytest test_app.py

  # 🟢 Job ที่ 2: สั่ง Deployment ตรงลงมาที่เครื่อง Linux (WSL) ที่บ้านผ่านระบบ Self-hosted Runner
  deploy:
    needs: build-and-test
    runs-on: self-hosted  # 👈 ระบบจะส่งสัญญาณตรงมาที่เครื่องคอมพิวเตอร์ของคุณโดยอัตโนมัติ

    steps:
      - name: Checkout Code to Home Server
        uses: actions/checkout@v4  # ดึงโค้ดเวอร์ชันล่าสุดมาอัปเดตลงโฟลเดอร์ทำงานบนเครื่องคอมของคุณเอง

      - name: Auto Deploy on WSL
        run: |
          echo "========================================="
          echo "🟢 GitHub Actions สั่งงานตรงลงมาที่ WSL สำเร็จ!"
          echo "========================================="
          
          # 🛠️ พาร์ทนี้ใส่คำสั่งรันแอปพลิเคชันของคุณตามโครงสร้างจริงได้เลยครับ เช่น:
          # (เคสที่ 1: รันผ่าน Virtual Environment ของ Python)
          # source venv/bin/activate
          # pip install -r requirements.txt
          # python app.py &
          
          # (เคสที่ 2: หากคุณต้องการปรับไปรันผ่าน Docker ในอนาคต)
          # docker compose down
          # docker compose up -d --build
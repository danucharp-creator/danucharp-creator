name: Production Docker CI/CD Pipeline with Security Scanning

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  # 🟢 Job 1: ตรวจสอบโค้ดเบื้องหลัง (SonarQube Analysis)
  sonarqube-analysis:
    runs-on: self-hosted # วิ่งมาใช้ทรัพยากรที่เครื่องบ้านคุณ
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ดาวน์โหลดและติดตั้ง Sonar Scanner CLI ลงในเครื่องอัตโนมัติรอบเดียวจบ
      - name: Install and Run SonarQube Scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "========================================="
          echo "🔍 เริ่มต้นติดตั้งและสแกนด้วย Sonar Scanner"
          echo "========================================="
          
          # 1. เช็กว่าในเครื่องมีคำสั่ง sonar-scanner ไหม ถ้าไม่มีให้โหลดมาตั้งค่าแบบพกพา (Portable)
          if [ ! -d "$HOME/.sonar/sonar-scanner" ]; then
            echo "📥 ไม่พบระบบสแกนในเครื่อง กำลังติดตั้งเวอร์ชันเสถียร..."
            mkdir -p $HOME/.sonar
            curl -sSLo $HOME/.sonar/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip -o -q $HOME/.sonar/sonar-scanner.zip -d $HOME/.sonar/
            mv $HOME/.sonar/sonar-scanner-5.0.1.3006-linux $HOME/.sonar/sonar-scanner
          fi
          
          # 2. เพิ่ม Path ลงในเซสชันนี้ชั่วคราว เพื่อให้เรียกใช้คำสั่งได้ทันที
          export PATH="$HOME/.sonar/sonar-scanner/bin:$PATH"
          
          # 3. สั่งยิงสแกนโค้ดโปรเจกต์ส่งตรงเข้าเซิร์ฟเวอร์ SonarQube ในเครื่อง WSL ทันที
          sonar-scanner \
            -Dsonar.projectKey=python-cicd-project \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN

  # 🔴 Job 2: สแกนหาช่องโหว่ความปลอดภัย (Trivy Vulnerability Scan)
  security-vulnerability-scan:
    needs: sonarqube-analysis
    runs-on: ubuntu-latest # ใช้พลังคลาวด์ช่วยสแกนตัวโค้ดก่อนบิวด์
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1' # 🔥 ตรรกะเด็ด: ถ้าเจอช่องโหว่ระดับ CRITICAL ให้สั่งท่อพังทันที ห้ามปล่อยผ่าน!
          severity: 'CRITICAL'

  # 🟢 Job 3: บิวด์แอปพลิเคชันเป็น Container Image (ทำงานเมื่อผ่านการสแกนแล้วเท่านั้น)
  build-and-push-image:
    needs: security-vulnerability-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/danucharp-creator/cicd-app:latest

  # 🟢 Job 4: สั่งเดพิวลอยล์ลงคอมบ้านผ่าน Docker Compose
  deploy-to-home-server:
    needs: build-and-push-image
    runs-on: self-hosted
    steps:
      - name: Checkout docker-compose file only
        uses: actions/checkout@v4

      # สั่งรันแอปพลิเคชันผ่าน Docker Compose ในเครื่องคอมของคุณ
      - name: Run Application via Docker Compose
        run: |
          echo "========================================="
          echo "🐋 เริ่มต้นกระบวนการอัปเดตระบบด้วย Docker"
          echo "========================================="
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
          sudo docker compose pull
          sudo docker compose up -d --build
          sudo docker image prune -f
          echo "🟢 เดพิวลอยล์แอปที่ผ่านการสแกนความปลอดภัยเรียบร้อยแล้ว!"